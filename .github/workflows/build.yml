name: Build and Release APK

on:
  workflow_dispatch:

env:
  KEY_ALIAS: "bonelag"
  KEY_PASSWORD: "bonelag"
  STORE_PASSWORD: "bonelag"
  KEYSTORE_BASE64: ""

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract version name
        id: get_version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Remove default debug signing config for release
        run: |
          sed -i 's/signingConfig = signingConfigs.getByName("debug")//g' app/build.gradle.kts

      - name: Build Unsigned APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -rn | head -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks release.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$STORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --out app/build/outputs/apk/release/PlayTranslate-${{ steps.get_version.outputs.tag }}.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/PlayTranslate-${{ steps.get_version.outputs.tag }}.apk"
          tag: ${{ steps.get_version.outputs.tag }}
          name: "PlayTranslate ${{ steps.get_version.outputs.tag }}"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
